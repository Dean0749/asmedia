<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASMedia 產品規格查找系統 - 完整清單版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', 'Microsoft JhengHei', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(0, 0, 0, 0.05); }
        .status-badge { position: absolute; top: 1rem; right: 1rem; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-mp { background: #dcfce7; color: #166534; }
        .status-sampling { background: #fef9c3; color: #854d0e; }
        .status-dev { background: #e0e7ff; color: #3730a3; }
        .speed-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #f1f5f9; color: #475569; }
        .filter-select { @apply w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-blue-500; }
        .label-heading { @apply text-[10px] font-black text-gray-400 uppercase tracking-widest mb-2 block; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <nav class="bg-slate-900 text-white px-6 py-4 sticky top-0 z-50 shadow-2xl border-b-4 border-blue-600">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center">
                <div class="bg-blue-600 text-white font-black italic px-3 py-1 rounded mr-3">ASMEDIA</div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight">產品規格查找系統</h1>
                    <p class="text-[10px] text-blue-300 font-medium opacity-80 uppercase">Roadmap Full Database (Revision 1.5)</p>
                </div>
            </div>
            <div id="clock" class="text-xs font-mono text-gray-400 hidden md:block"></div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        <!-- 搜尋與多重過濾面板 -->
        <div class="glass-card rounded-2xl shadow-sm border border-slate-200 p-6 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="label-heading">上行介面 (USP)</label>
                    <select id="uspFilter" class="filter-select">
                        <option value="all">全部 USP</option>
                        <option value="PCIe Gen5">PCIe Gen5</option>
                        <option value="PCIe Gen4">PCIe Gen4</option>
                        <option value="PCIe Gen3">PCIe Gen3</option>
                        <option value="PCIe Gen2">PCIe Gen2</option>
                        <option value="USB4 80G">USB4 80G</option>
                        <option value="USB4 40G">USB4 40G</option>
                        <option value="USB 20G">USB 20G</option>
                        <option value="USB 10G">USB 10G</option>
                        <option value="USB 5G">USB 5G</option>
                        <option value="SATA 6G">SATA 6G</option>
                        <option value="HDMI 1.4">HDMI 1.4</option>
                    </select>
                </div>
                <div>
                    <label class="label-heading">下行/功能 (DSP)</label>
                    <select id="dspFilter" class="filter-select">
                        <option value="all">全部 DSP</option>
                        <option value="USB4 80G">USB4 80G</option>
                        <option value="USB4 40G">USB4 40G</option>
                        <option value="USB 20G">USB 20G</option>
                        <option value="USB 10G">USB 10G</option>
                        <option value="USB 5G">USB 5G</option>
                        <option value="PCIe NVMe">PCIe NVMe / Device</option>
                        <option value="SATA">SATA Drive / 2 Bay</option>
                        <option value="24 PHYs/Lanes">24 PHYs / Lanes</option>
                        <option value="12 PHYs/Lanes">12 PHYs / Lanes</option>
                        <option value="6-8 PHYs/Lanes">6-8 PHYs / Lanes</option>
                        <option value="Redriver/Mux">Redriver / Mux</option>
                    </select>
                </div>
                <div class="lg:col-span-2">
                    <label class="label-heading">關鍵字搜尋 (型號、PHY 數量、功能描述)</label>
                    <input type="text" id="keywordSearch" placeholder="例如: 2824, 2464, Type-C, mux..." 
                        class="w-full bg-white border border-gray-200 rounded-lg px-4 py-2.5 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
        </div>

        <div class="mb-4 px-2 flex justify-between items-center text-sm">
            <div class="font-bold text-slate-500">符合條件: <span id="matchCount" class="text-blue-600">0</span> 顆晶片</div>
            <button onclick="resetFilters()" class="text-blue-600 hover:underline font-bold text-xs">重設所有過濾</button>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        <div id="emptyState" class="hidden text-center py-20 text-slate-400 font-bold">查無符合條件的晶片</div>
    </main>

    <script>
        const products = [
            // --- USB Host Controllers ---
            { id: "ASM5342", cat: "Host", usp: "PCIe Gen5 x4", dsp: "USB4 80G (2 ports)", speed: "80G", status: "Sampling", features: "USB4 80G Host, 2 lanes" },
            { id: "ASM5341", cat: "Host", usp: "PCIe Gen5 x4", dsp: "USB4 80G (1 port)", speed: "80G", status: "Sampling", features: "USB4 80G Host, 2 lanes" },

            // --- USB Device Bridge ---
            { id: "ASM2564PDX", cat: "Bridge", usp: "USB4 80G", dsp: "PCIe NVMe (Type-C)", speed: "80G", status: "Sampling", features: "USB4 80G to PCIe, Type-C" },
            { id: "ASM2564PD", cat: "Bridge", usp: "USB4 80G", dsp: "PCIe NVMe (Type-C)", speed: "80G", status: "Sampling", features: "USB4 80G to PCIe, Type-C" },
            { id: "ASM2464PDX", cat: "Bridge", usp: "USB4 40G", dsp: "PCIe NVMe (Type-C)", speed: "40G", status: "MP", features: "USB4 40G to PCIe, Type-C" },
            { id: "ASM2464PD", cat: "Bridge", usp: "USB4 40G", dsp: "PCIe NVMe (Type-C)", speed: "40G", status: "MP", features: "USB4 40G to PCIe, Type-C" },
            { id: "ASM2364", cat: "Bridge", usp: "USB4 40G", dsp: "PCIe NVMe (Type-C)", speed: "40G", status: "MP", features: "USB4 40G to PCIe, Type-C" },
            { id: "ASM2362", cat: "Bridge", usp: "USB4 40G", dsp: "PCIe NVMe (Type-C)", speed: "40G", status: "MP", features: "USB4 40G to PCIe, Type-C" },
            { id: "ASM1352R", cat: "Bridge", usp: "USB 20G", dsp: "PCIe NVMe", speed: "20G", status: "MP", features: "USB 10G/20G to PCIe NVMe" },
            { id: "ASM1153", cat: "Bridge", usp: "USB 10G", dsp: "2 bay SATA", speed: "10G", status: "MP", features: "USB 10G to 2 bay SATA drive" },
            { id: "ASM1153E", cat: "Bridge", usp: "USB 10G", dsp: "SATA", speed: "10G", status: "MP", features: "USB 10G to SATA drive" },
            { id: "ASM225CM", cat: "Bridge", usp: "USB 5G", dsp: "SATA (Type-C)", speed: "5G", status: "MP", features: "USB 5G Type-C to SATA drive" },

            // --- Signaling ---
            { id: "ASM1480", cat: "Signaling", usp: "PCIe Gen3", dsp: "1:2 Mux (8G)", speed: "8G", status: "MP", features: "PCIe Mux, 1:2, 4ch mux, 8G" },
            { id: "ASM2480B", cat: "Signaling", usp: "PCIe Gen4", dsp: "1:2 Mux (16G)", speed: "16G", status: "MP", features: "PCIe Mux, 1:2, 4ch mux, 16G" },
            { id: "ASM1467", cat: "Signaling", usp: "PCIe Gen2", dsp: "Redriver (1 lane)", speed: "5G", status: "MP", features: "PCIe Repeater, 1 lane, Gen2 redriver" },
            { id: "ASM1468", cat: "Signaling", usp: "PCIe Gen3", dsp: "Redriver (2 lanes)", speed: "8G", status: "MP", features: "PCIe Repeater, 2 lanes, Gen3 redriver" },
            { id: "ASM1466", cat: "Signaling", usp: "SATA 6G", dsp: "Redriver (1 port)", speed: "6G", status: "MP", features: "SATA Repeater, 1 port, 6G redriver" },
            { id: "ASM1442K", cat: "Signaling", usp: "HDMI 1.4", dsp: "Level-shifter", speed: "3.4G", status: "MP", features: "HDMI 1.4 Level-shifter (1.05V <-> 3.3V)" },

            // --- PCIe Switch (Gen4/5) ---
            { id: "ASMx824", cat: "Switch", usp: "PCIe Gen5", dsp: "24 lanes / 12 ports", speed: "Gen5", status: "Dev", features: "PCIe Packet Switch, 24 lanes, 12 downstream ports" },
            { id: "ASMx812X", cat: "Switch", usp: "PCIe Gen5", dsp: "24 lanes / 12 ports", speed: "Gen5", status: "Dev", features: "PCIe Packet Switch, 24 lanes, 12 downstream ports" },
            { id: "ASMx812A", cat: "Switch", usp: "PCIe Gen5", dsp: "24 lanes / 12 ports", speed: "Gen5", status: "Dev", features: "PCIe Packet Switch, 24 lanes, 12 downstream ports" },
            { id: "ASMx812I", cat: "Switch", usp: "PCIe Gen5", dsp: "16 lanes / 12 ports", speed: "Gen5", status: "Dev", features: "PCIe Packet Switch, 16 lanes, 12 downstream ports" },
            { id: "ASMx812", cat: "Switch", usp: "PCIe Gen5", dsp: "12 lanes / 6 ports", speed: "Gen5", status: "Dev", features: "PCIe Packet Switch, 12 lanes, 6 downstream ports" },

            { id: "ASM2824I", cat: "Switch", usp: "PCIe Gen3", dsp: "24 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 24 PHYs" },
            { id: "ASM2824", cat: "Switch", usp: "PCIe Gen3", dsp: "24 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 24 PHYs" },
            { id: "ASM2812X", cat: "Switch", usp: "PCIe Gen3", dsp: "12 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 12 PHYs" },
            { id: "ASM2812A", cat: "Switch", usp: "PCIe Gen3", dsp: "12 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 12 PHYs" },
            { id: "ASM2812I", cat: "Switch", usp: "PCIe Gen3", dsp: "12 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 12 PHYs" },
            { id: "ASM2812", cat: "Switch", usp: "PCIe Gen3", dsp: "12 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 12 PHYs" },
            { id: "ASM2806A", cat: "Switch", usp: "PCIe Gen3", dsp: "6 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 6 PHYs" },
            { id: "ASM2806I", cat: "Switch", usp: "PCIe Gen3", dsp: "6 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 6 PHYs" },
            { id: "ASM2806", cat: "Switch", usp: "PCIe Gen3", dsp: "6 PHYs", speed: "Gen3", status: "MP", features: "PCIe Packet Switch (Gen3), 6 PHYs" },

            // --- PCIe Switch (Gen2) ---
            { id: "ASM1824I", cat: "Switch", usp: "PCIe Gen2", dsp: "24 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 24 PHYs" },
            { id: "ASM1824", cat: "Switch", usp: "PCIe Gen2", dsp: "24 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 24 PHYs" },
            { id: "ASM1812X", cat: "Switch", usp: "PCIe Gen2", dsp: "12 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 12 PHYs" },
            { id: "ASM1812A", cat: "Switch", usp: "PCIe Gen2", dsp: "12 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 12 PHYs" },
            { id: "ASM1812I", cat: "Switch", usp: "PCIe Gen2", dsp: "12 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 12 PHYs" },
            { id: "ASM1812", cat: "Switch", usp: "PCIe Gen2", dsp: "12 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 12 PHYs" },
            { id: "ASM1806A", cat: "Switch", usp: "PCIe Gen2", dsp: "6 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 6 PHYs" },
            { id: "ASM1806I", cat: "Switch", usp: "PCIe Gen2", dsp: "6 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 6 PHYs" },
            { id: "ASM1806", cat: "Switch", usp: "PCIe Gen2", dsp: "6 PHYs", speed: "Gen2", status: "MP", features: "PCIe Packet Switch (Gen2), 6 PHYs" },
            { id: "ASM1187e", cat: "Switch", usp: "PCIe Gen2", dsp: "8 PHYs", speed: "Gen2", status: "MP", features: "PCIe Switch, 8 PHYs" },
            { id: "ASM1184e", cat: "Switch", usp: "PCIe Gen2", dsp: "5 PHYs", speed: "Gen2", status: "MP", features: "PCIe Switch, 5 PHYs" },
            { id: "ASM1182e", cat: "Switch", usp: "PCIe Gen2", dsp: "3 PHYs", speed: "Gen2", status: "MP", features: "PCIe Switch, 3 PHYs" }
        ];

        function render() {
            const usp = document.getElementById('uspFilter').value;
            const dsp = document.getElementById('dspFilter').value;
            const query = document.getElementById('keywordSearch').value.toUpperCase();

            const filtered = products.filter(p => {
                const matchUsp = usp === 'all' || p.usp.includes(usp);
                
                // DSP 複雜過濾邏輯
                let matchDsp = true;
                if (dsp !== 'all') {
                    if (dsp === '24 PHYs/Lanes') matchDsp = p.dsp.includes('24');
                    else if (dsp === '12 PHYs/Lanes') matchDsp = p.dsp.includes('12') || p.dsp.includes('16');
                    else if (dsp === '6-8 PHYs/Lanes') matchDsp = (p.dsp.includes('6') || p.dsp.includes('8') || p.dsp.includes('5') || p.dsp.includes('3')) && !p.dsp.includes('16');
                    else if (dsp === 'PCIe NVMe') matchDsp = p.dsp.includes('NVMe') || p.dsp.includes('PCIe');
                    else if (dsp === 'Redriver/Mux') matchDsp = p.dsp.includes('Mux') || p.dsp.includes('redriver') || p.dsp.includes('Level');
                    else matchDsp = p.dsp.includes(dsp);
                }

                const matchKeyword = p.id.includes(query) || 
                                   p.features.toUpperCase().includes(query) || 
                                   p.usp.toUpperCase().includes(query) || 
                                   p.dsp.toUpperCase().includes(query);
                
                return matchUsp && matchDsp && matchKeyword;
            });

            const grid = document.getElementById('productGrid');
            const count = document.getElementById('matchCount');
            const empty = document.getElementById('emptyState');

            grid.innerHTML = '';
            count.innerText = filtered.length;

            if (filtered.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                filtered.forEach(p => {
                    const statusClass = `status-${p.status.toLowerCase()}`;
                    grid.innerHTML += `
                        <div class="glass-card rounded-xl p-6 relative hover:shadow-xl hover:border-blue-400 transition-all border border-slate-100">
                            <div class="status-badge ${statusClass}">${p.status}</div>
                            <div class="mb-4">
                                <span class="text-[9px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded uppercase tracking-widest">${p.cat}</span>
                                <h3 class="text-2xl font-black text-slate-800 mt-1">${p.id}</h3>
                            </div>
                            <div class="flex gap-2 mb-4">
                                <span class="speed-tag">${p.speed}</span>
                            </div>
                            <div class="space-y-2 text-xs mb-4">
                                <div class="flex justify-between border-b pb-1">
                                    <span class="text-gray-400">Upstream (USP):</span>
                                    <span class="font-bold text-slate-700">${p.usp}</span>
                                </div>
                                <div class="flex justify-between border-b pb-1">
                                    <span class="text-gray-400">Downstream (DSP):</span>
                                    <span class="font-bold text-slate-700">${p.dsp}</span>
                                </div>
                            </div>
                            <div class="bg-blue-50/50 p-2 rounded text-[11px] text-slate-600 leading-tight italic">
                                ${p.features}
                            </div>
                        </div>
                    `;
                });
            }
        }

        function resetFilters() {
            document.getElementById('uspFilter').value = 'all';
            document.getElementById('dspFilter').value = 'all';
            document.getElementById('keywordSearch').value = '';
            render();
        }

        ['uspFilter', 'dspFilter', 'keywordSearch'].forEach(id => {
            document.getElementById(id).addEventListener('input', render);
        });

        window.onload = () => {
            render();
            setInterval(() => { 
                document.getElementById('clock').innerText = new Date().toLocaleString('zh-TW'); 
            }, 1000);
        };
    </script>
</body>
</html>
